<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OH7 Pause Menu V3</title>
  <style>
    :root {
      --bg: #050000;
      --hud: #ff7a00;
      --hud-dim: rgba(255, 122, 0, 0.35);
      --text: #ff9a1f;
      --panel: rgba(20, 5, 0, 0.4);
      --shadow: 0 0 8px rgba(255, 122, 0, 0.4), 0 0 18px rgba(255, 70, 0, 0.18);
    }* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: "Courier New", monospace;
}

body {
  position: relative;
  overflow-x: hidden;
  overflow-y: hidden;
}

.screen {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at center, rgba(120, 20, 0, 0.22) 0%, rgba(0, 0, 0, 0) 45%),
    linear-gradient(rgba(255, 100, 0, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 100, 0, 0.04) 1px, transparent 1px),
    linear-gradient(180deg, #120100 0%, #050000 55%, #000000 100%);
  background-size: auto, 5px 5px, 5px 5px, auto;
  isolation: isolate;
  padding: 20px 0;
}

.screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 25%, rgba(0, 0, 0, 0.95) 0 8%, transparent 9%),
    radial-gradient(circle at 70% 35%, rgba(0, 0, 0, 0.9) 0 11%, transparent 12%),
    radial-gradient(circle at 35% 70%, rgba(0, 0, 0, 0.92) 0 10%, transparent 11%),
    radial-gradient(circle at 75% 78%, rgba(0, 0, 0, 0.88) 0 12%, transparent 13%),
    radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.75) 0 18%, transparent 19%);
  opacity: 0.9;
  mix-blend-mode: multiply;
  pointer-events: none;
}

.screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0) 0px,
    rgba(255, 255, 255, 0) 2px,
    rgba(255, 120, 0, 0.025) 3px,
    rgba(255, 255, 255, 0) 4px
  );
  opacity: 0.5;
  pointer-events: none;
  animation: scanMove 7s linear infinite;
}

@keyframes scanMove {
  from { transform: translateY(0); }
  to { transform: translateY(12px); }
}

.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, transparent 45%, rgba(0, 0, 0, 0.45) 100%);
  pointer-events: none;
  z-index: 2;
}

.boot-wrap,
.menu-wrap {
  position: relative;
  width: min(90vw, 640px);
  z-index: 3;
}

.boot-wrap {
  min-height: min(72vh, 700px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.target-box {
  position: relative;
  width: 90px;
  height: 90px;
  transform: scale(0.45);
  opacity: 0;
  animation:
    bootAppear 0.35s ease-out forwards 0.2s,
    boxExpand 1.15s cubic-bezier(.2, .85, .18, 1) forwards 0.65s;
}

@keyframes bootAppear {
  to {
    opacity: 1;
    transform: scale(0.45);
  }
}

@keyframes boxExpand {
  to {
    width: min(78vw, 460px);
    height: min(44vh, 300px);
    transform: scale(1);
  }
}

.corner {
  position: absolute;
  width: 42px;
  height: 42px;
  border-color: var(--hud);
  filter: drop-shadow(0 0 5px rgba(255, 120, 0, 0.75));
  animation: flicker 2.2s infinite;
}

.corner.tl {
  top: 0;
  left: 0;
  border-top: 6px solid var(--hud);
  border-left: 6px solid var(--hud);
}

.corner.tr {
  top: 0;
  right: 0;
  border-top: 6px solid var(--hud);
  border-right: 6px solid var(--hud);
}

.corner.bl {
  bottom: 0;
  left: 0;
  border-bottom: 6px solid var(--hud);
  border-left: 6px solid var(--hud);
}

.corner.br {
  bottom: 0;
  right: 0;
  border-bottom: 6px solid var(--hud);
  border-right: 6px solid var(--hud);
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  8% { opacity: 0.78; }
  12% { opacity: 1; }
  16% { opacity: 0.65; }
  18% { opacity: 1; }
  52% { opacity: 0.92; }
  54% { opacity: 0.72; }
  56% { opacity: 1; }
}

.boot-content {
  position: absolute;
  inset: 26px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow: hidden;
}

.terminal {
  width: 100%;
  font-size: clamp(13px, 1.9vw, 18px);
  line-height: 1.55;
  letter-spacing: 0.08em;
  white-space: pre-wrap;
  text-shadow: var(--shadow);
  color: var(--text);
  opacity: 0;
  transform: translateY(6px);
  animation: terminalIn 0.45s ease-out forwards 1.7s;
}

@keyframes terminalIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.cursor {
  display: inline-block;
  width: 0.7ch;
  animation: blink 0.9s steps(1) infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.menu-wrap {
  display: none;
  opacity: 0;
  min-height: auto;
  padding: 42px 0;
  animation: menuFade 0.55s ease-out forwards;
}

@keyframes menuFade {
  to { opacity: 1; }
}

.hud-frame {
  position: absolute;
  inset: 0;
  min-height: 100%;
  pointer-events: none;
}

.hud-frame .corner {
  width: 55px;
  height: 55px;
  border-width: 5px;
}

.menu-panel {
  position: relative;
  margin: 42px 28px;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  gap: 18px;
  padding: 12px;
}

.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--hud-dim);
  text-shadow: var(--shadow);
}

.header-title {
  font-size: clamp(14px, 1.8vw, 18px);
  letter-spacing: 0.16em;
  line-height: 1.2;
  color: var(--text);
}

.header-user {
  font-size: clamp(10px, 1.3vw, 12px);
  opacity: 0.82;
  text-align: right;
  line-height: 1.2;
  color: var(--text);
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.stat {
  border: 1px solid var(--hud-dim);
  background: var(--panel);
  padding: 9px 10px;
  min-height: 54px;
  box-shadow: inset 0 0 0 1px rgba(255, 122, 0, 0.08);
}

.stat-label {
  font-size: 9px;
  opacity: 0.75;
  letter-spacing: 0.14em;
  margin-bottom: 4px;
  color: var(--text);
}

.stat-value {
  font-size: clamp(13px, 1.8vw, 18px);
  text-shadow: var(--shadow);
  line-height: 1.15;
  color: var(--text);
}

.menu-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  align-content: start;
}

.menu-btn {
  position: relative;
  border: 1px solid var(--hud-dim);
  background: rgba(15, 5, 0, 0.58);
  color: var(--text);
  padding: 11px 12px;
  text-align: left;
  font: inherit;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition:
    transform 0.15s ease,
    border-color 0.15s ease,
    background 0.15s ease,
    box-shadow 0.15s ease;
  overflow: hidden;
  min-height: 48px;
}

.menu-btn:hover,
.menu-btn.active {
  transform: translateY(-1px);
  border-color: var(--hud);
  background: rgba(30, 10, 0, 0.75);
  box-shadow: 0 0 0 1px rgba(255, 122, 0, 0.16), 0 0 16px rgba(255, 122, 0, 0.12);
}

.menu-btn::before {
  content: ">";
  position: absolute;
  left: 10px;
  opacity: 0;
  transition: opacity 0.15s ease;
  color: var(--text);
}

.menu-btn:hover::before,
.menu-btn.active::before {
  opacity: 1;
}

.menu-btn span {
  margin-left: 12px;
  display: inline-block;
  line-height: 1.15;
  color: var(--text);
}

.footer-line {
  font-size: 10px;
  opacity: 0.82;
  border-top: 1px solid var(--hud-dim);
  padding-top: 8px;
  letter-spacing: 0.08em;
  text-shadow: var(--shadow);
  line-height: 1.3;
  color: var(--text);
}

.overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: blur(4px);
  z-index: 50;
}

.overlay.open {
  display: flex;
}

.modal {
  width: min(92vw, 560px);
  position: relative;
  border: 1px solid var(--hud);
  background: linear-gradient(180deg, rgba(20, 6, 0, 0.96) 0%, rgba(8, 2, 0, 0.98) 100%);
  box-shadow: 0 0 0 1px rgba(255, 122, 0, 0.12), 0 0 28px rgba(255, 122, 0, 0.12);
  padding: 18px;
  color: var(--text);
}

.modal::before,
.modal::after {
  content: "";
  position: absolute;
  width: 26px;
  height: 26px;
  border-color: var(--hud);
  opacity: 0.95;
}

.modal::before {
  top: 8px;
  left: 8px;
  border-top: 3px solid var(--hud);
  border-left: 3px solid var(--hud);
}

.modal::after {
  right: 8px;
  bottom: 8px;
  border-right: 3px solid var(--hud);
  border-bottom: 3px solid var(--hud);
}

.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 0 12px;
  border-bottom: 1px solid var(--hud-dim);
}

.modal-kicker {
  font-size: 9px;
  letter-spacing: 0.18em;
  opacity: 0.75;
  margin-bottom: 8px;
  color: var(--text);
}

.modal-title {
  font-size: clamp(15px, 2vw, 20px);
  letter-spacing: 0.08em;
  text-shadow: var(--shadow);
  line-height: 1.2;
  color: var(--text);
}

.modal-close {
  border: 1px solid var(--hud-dim);
  background: rgba(18, 6, 0, 0.8);
  color: var(--text);
  font: inherit;
  font-size: 12px;
  letter-spacing: 0.12em;
  min-width: 42px;
  min-height: 38px;
  cursor: pointer;
  padding: 8px 10px;
}

.modal-close:hover {
  border-color: var(--hud);
  background: rgba(28, 10, 0, 0.9);
}

.modal-body {
  padding: 14px 0 6px;
  font-size: 13px;
  line-height: 1.6;
  opacity: 0.92;
  color: var(--text);
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  padding-top: 12px;
  border-top: 1px solid var(--hud-dim);
  margin-top: 12px;
}

.modal-action-btn {
  border: 1px solid var(--hud-dim);
  background: rgba(18, 6, 0, 0.8);
  color: var(--text);
  font: inherit;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 10px 12px;
  min-height: 40px;
}

.modal-action-btn:hover {
  border-color: var(--hud);
  background: rgba(28, 10, 0, 0.9);
}

.modal-select,
.modal-textarea {
  width: 100%;
  border: 1px solid var(--hud-dim);
  background: rgba(12, 4, 0, 0.82);
  color: var(--text);
  font: inherit;
  padding: 10px 12px;
  outline: none;
}

.modal-textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.5;
}

.modal-subtle {
  font-size: 11px;
  opacity: 0.8;
  line-height: 1.4;
  color: var(--text);
}

.modal-stack {
  display: grid;
  gap: 10px;
}

.inline-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.log-list {
  display: grid;
  gap: 8px;
  margin-top: 8px;
  max-height: 220px;
  overflow-y: auto;
  padding-right: 4px;
}

.log-entry {
  border: 1px solid var(--hud-dim);
  background: rgba(12, 4, 0, 0.55);
  padding: 10px;
}

.log-date {
  font-size: 10px;
  letter-spacing: 0.12em;
  opacity: 0.75;
  margin-bottom: 6px;
  color: var(--text);
}

.log-text {
  font-size: 12px;
  line-height: 1.45;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

.hidden {
  display: none !important;
}

@media (max-width: 640px) {
  .boot-wrap,
  .menu-wrap {
    width: min(94vw, 640px);
  }

  .menu-panel {
    margin: 28px 12px;
    gap: 12px;
    padding: 6px;
  }

  .header {
    gap: 8px;
  }

  .header-title {
    font-size: 14px;
  }

  .header-user {
    font-size: 10px;
  }

  .stats {
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }

  .stat {
    padding: 8px 8px;
    min-height: 50px;
  }

  .stat-label {
    font-size: 8px;
    letter-spacing: 0.12em;
  }

  .stat-value {
    font-size: 12px;
  }

  .menu-buttons {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .menu-btn {
    min-height: 44px;
    padding: 10px 10px;
    font-size: 11px;
    letter-spacing: 0.08em;
  }

  .menu-btn span {
    margin-left: 10px;
  }

  .footer-line {
    font-size: 9px;
  }

  .modal {
    width: min(94vw, 560px);
    padding: 14px;
  }

  .modal-kicker {
    font-size: 8px;
  }

  .modal-title {
    font-size: 14px;
  }

  .modal-body,
  .log-text {
    font-size: 12px;
    line-height: 1.5;
  }

  .modal-subtle,
  .log-date {
    font-size: 10px;
  }

  .modal-close,
  .modal-action-btn {
    font-size: 10px;
  }

  .target-box {
    animation:
      bootAppear 0.35s ease-out forwards 0.2s,
      boxExpandMobile 1.15s cubic-bezier(.2, .85, .18, 1) forwards 0.65s;
  }

  @keyframes boxExpandMobile {
    to {
      width: min(84vw, 360px);
      height: min(34vh, 220px);
      transform: scale(1);
    }
  }
}

  </style>
</head>
<body>
  <main class="screen">
    <div class="vignette"></div><section class="boot-wrap" id="bootWrap">
  <div class="target-box" id="targetBox">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="boot-content">
      <div class="terminal" id="terminal"></div>
    </div>
  </div>
</section>

<section class="menu-wrap" id="menuWrap">
  <div class="hud-frame">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
  </div>

  <div class="menu-panel">
    <div class="header">
      <div class="header-title">OH7 // PAUSE MENU</div>
      <div class="header-user">USER: ORDER066.EXE</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">CREATIVE OUTPUT</div>
        <div class="stat-value">3 FILES</div>
      </div>
      <div class="stat">
        <div class="stat-label">STAMINA</div>
        <div class="stat-value">42%</div>
      </div>
      <div class="stat">
        <div class="stat-label">FOCUS</div>
        <div class="stat-value">UNSTABLE</div>
      </div>
      <div class="stat">
        <div class="stat-label">DISCIPLINE</div>
        <div class="stat-value">RECOVERING</div>
      </div>
    </div>

    <div class="menu-buttons">
      <button class="menu-btn active" data-panel="creative"><span>Creative Prompt</span></button>
      <button class="menu-btn" data-panel="boss"><span>Fight Boss</span></button>
      <button class="menu-btn" data-panel="campfire"><span>Campfire Log</span></button>
      <button class="menu-btn" data-panel="mission"><span>Mission Board</span></button>
      <button class="menu-btn" data-panel="daily"><span>Daily Run</span></button>
      <button class="menu-btn" data-panel="stats"><span>Stats</span></button>
      <button class="menu-btn" data-panel="inventory"><span>Inventory</span></button>
      <button class="menu-btn" data-panel="settings"><span>Settings</span></button>
    </div>

    <div class="footer-line">CAMPFIRE LINK: STANDBY // MISSION BOARD: READY</div>
  </div>
</section>

  </main>  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div>
          <div class="modal-kicker" id="modalKicker">CREATIVE PROMPT</div>
          <div class="modal-title" id="modalTitle">Signal received.</div>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Close panel">X</button>
      </div><div class="modal-body" id="modalBody"></div>

  <div class="modal-actions">
    <button class="modal-action-btn" id="modalAction">CLOSE PANEL</button>
  </div>
</div>

  </div>  <script>
    const bootLines = [
      "OH7 // SYSTEM WAKE",
      "USER: ORDER066.EXE",
      "CREATIVE OUTPUT: 3 FILES",
      "STAMINA: 42%",
      "FOCUS: UNSTABLE",
      "DISCIPLINE: RECOVERING",
      "LOADING PAUSE MENU..."
    ];

    const panelContent = {
      creative: {
        kicker: "CREATIVE PROMPT",
        title: "Signal received.",
        type: "creative"
      },
      boss: {
        kicker: "FIGHT BOSS",
        title: "Current enemy: Drift.",
        type: "text",
        body: "Win condition: create one real file today. No tutorials. No browsing. Output ends the encounter."
      },
      campfire: {
        kicker: "CAMPFIRE LOG",
        title: "Reflection channel open.",
        type: "campfire"
      },
      mission: {
        kicker: "MISSION BOARD",
        title: "Primary directive.",
        type: "text",
        body: "Stay on track: move toward a future where you are creative, free, and actually happy."
      },
      daily: {
        kicker: "DAILY RUN",
        title: "Suggested loop.",
        type: "text",
        body: "Warm up. Make something. Log it. Reset the room. Protect momentum."
      },
      stats: {
        kicker: "STATS",
        title: "System reading.",
        type: "text",
        body: "Creative Output: 3 files. Stamina: 42%. Focus: unstable. Discipline: recovering."
      },
      inventory: {
        kicker: "INVENTORY",
        title: "Available tools.",
        type: "text",
        body: "Guitar. Reaper. Voice notes. OH7. Bare hands. That is enough to start."
      },
      settings: {
        kicker: "SETTINGS",
        title: "Interface controls.",
        type: "text",
        body: "Version: V3. Boot skip key: S. Popup system: active. Saved notes use safe text rendering only."
      }
    };

    const promptBank = {
      riff: [
        "Write a 4-bar loop using one chord you trust and one chord you usually avoid.",
        "Create a riff that begins on beat 2 instead of beat 1.",
        "Use one open string drone and build harmony around it.",
        "Write a part with more space than notes."
      ],
      lyrics: [
        "Write four lines about wanting to leave but staying anyway.",
        "Write a hook using a contradiction.",
        "Start with an image, not an explanation.",
        "Write a line that sounds calm but means something heavy."
      ],
      rhythm: [
        "Build a groove around a 3-3-2 feel.",
        "Accent the offbeat and leave beat 1 emptier than usual.",
        "Write a part that feels like it is leaning forward.",
        "Use silence as part of the rhythm, not just the gap."
      ]
    };

    const STORAGE_KEYS = {
      campfire: "oh7_campfire_logs_v1",
      promptCategory: "oh7_prompt_category_v1",
      promptText: "oh7_prompt_text_v1"
    };

    const terminal = document.getElementById("terminal");
    const bootWrap = document.getElementById("bootWrap");
    const menuWrap = document.getElementById("menuWrap");
    const overlay = document.getElementById("overlay");
    const modalKicker = document.getElementById("modalKicker");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalClose = document.getElementById("modalClose");
    const modalAction = document.getElementById("modalAction");

    let lineIndex = 0;
    let charIndex = 0;
    let builtText = "";
    let bootFinished = false;

    function setInitialState() {
      bootWrap.classList.remove("hidden");
      bootWrap.style.display = "flex";
      menuWrap.classList.remove("hidden");
      menuWrap.style.display = "none";
      overlay.classList.remove("open");
      terminal.innerHTML = "";
      lineIndex = 0;
      charIndex = 0;
      builtText = "";
      bootFinished = false;
      document.body.style.overflowY = "hidden";
    }

    function typeBootText() {
      if (bootFinished) return;

      if (lineIndex >= bootLines.length) {
        terminal.innerHTML = builtText + '<span class="cursor">█</span>';
        bootFinished = true;
        setTimeout(showMenu, 900);
        return;
      }

      const currentLine = bootLines[lineIndex];

      if (charIndex < currentLine.length) {
        builtText += currentLine.charAt(charIndex);
        charIndex++;
        terminal.innerHTML = builtText + '<span class="cursor">█</span>';
        setTimeout(typeBootText, 28);
      } else {
        builtText += "
";
        lineIndex++;
        charIndex = 0;
        terminal.innerHTML = builtText + '<span class="cursor">█</span>';
        setTimeout(typeBootText, 160);
      }
    }

    function showMenu() {
      bootWrap.classList.add("hidden");
      bootWrap.style.display = "none";
      menuWrap.style.display = "block";
      document.body.style.overflowY = "auto";
    }

    function skipBoot() {
      bootFinished = true;
      showMenu();
    }

    function clearNode(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function loadCampfireLogs() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.campfire);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveCampfireLogs(logs) {
      localStorage.setItem(STORAGE_KEYS.campfire, JSON.stringify(logs));
    }

    function renderTextPanel(content) {
      clearNode(modalBody);
      const p = document.createElement("div");
      p.className = "modal-subtle";
      p.textContent = content.body || "No data.";
      modalBody.appendChild(p);
    }

    function renderCreativePanel() {
      clearNode(modalBody);

      const stack = document.createElement("div");
      stack.className = "modal-stack";

      const hint = document.createElement("div");
      hint.className = "modal-subtle";
      hint.textContent = "Choose a category and reroll until something hits. Prompt state is saved on this device only.";

      const select = document.createElement("select");
      select.className = "modal-select";

      Object.keys(promptBank).forEach((key) => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = key.toUpperCase();
        select.appendChild(option);
      });

      const savedCategory = localStorage.getItem(STORAGE_KEYS.promptCategory) || "riff";
      if (promptBank[savedCategory]) select.value = savedCategory;

      const promptBox = document.createElement("div");
      promptBox.className = "log-entry";

      const promptLabel = document.createElement("div");
      promptLabel.className = "log-date";
      promptLabel.textContent = "CURRENT PROMPT";

      const promptText = document.createElement("div");
      promptText.className = "log-text";
      const savedPrompt = localStorage.getItem(STORAGE_KEYS.promptText);
      promptText.textContent = savedPrompt || "Press REROLL PROMPT to generate a mission.";

      function rerollPrompt() {
        const category = select.value;
        const bank = promptBank[category] || [];
        if (!bank.length) {
          promptText.textContent = "No prompts available.";
          return;
        }
        const next = bank[Math.floor(Math.random() * bank.length)];
        promptText.textContent = next;
        localStorage.setItem(STORAGE_KEYS.promptCategory, category);
        localStorage.setItem(STORAGE_KEYS.promptText, next);
      }

      const actions = document.createElement("div");
      actions.className = "inline-actions";

      const rerollBtn = document.createElement("button");
      rerollBtn.className = "modal-action-btn";
      rerollBtn.type = "button";
      rerollBtn.textContent = "REROLL PROMPT";
      rerollBtn.addEventListener("click", rerollPrompt);

      const saveBtn = document.createElement("button");
      saveBtn.className = "modal-action-btn";
      saveBtn.type = "button";
      saveBtn.textContent = "SAVE CATEGORY";
      saveBtn.addEventListener("click", () => {
        localStorage.setItem(STORAGE_KEYS.promptCategory, select.value);
      });

      select.addEventListener("change", () => {
        localStorage.setItem(STORAGE_KEYS.promptCategory, select.value);
      });

      actions.appendChild(rerollBtn);
      actions.appendChild(saveBtn);
      promptBox.appendChild(promptLabel);
      promptBox.appendChild(promptText);
      stack.appendChild(hint);
      stack.appendChild(select);
      stack.appendChild(promptBox);
      stack.appendChild(actions);
      modalBody.appendChild(stack);
    }

    function renderCampfirePanel() {
      clearNode(modalBody);

      const stack = document.createElement("div");
      stack.className = "modal-stack";

      const hint = document.createElement("div");
      hint.className = "modal-subtle";
      hint.textContent = "Logs are stored only in this browser on this device. Entries are rendered as plain text for safety.";

      const textarea = document.createElement("textarea");
      textarea.className = "modal-textarea";
      textarea.placeholder = "What did you make, learn, resist, or survive today?";

      const actions = document.createElement("div");
      actions.className = "inline-actions";

      const saveBtn = document.createElement("button");
      saveBtn.className = "modal-action-btn";
      saveBtn.type = "button";
      saveBtn.textContent = "SAVE LOG";

      const clearBtn = document.createElement("button");
      clearBtn.className = "modal-action-btn";
      clearBtn.type = "button";
      clearBtn.textContent = "CLEAR ALL";

      const list = document.createElement("div");
      list.className = "log-list";

      function redrawLogs() {
        clearNode(list);
        const logs = loadCampfireLogs();

        if (!logs.length) {
          const empty = document.createElement("div");
          empty.className = "modal-subtle";
          empty.textContent = "No campfire logs saved yet.";
          list.appendChild(empty);
          return;
        }

        logs.slice().reverse().forEach((log) => {
          const item = document.createElement("div");
          item.className = "log-entry";

          const date = document.createElement("div");
          date.className = "log-date";
          date.textContent = log.date || "UNKNOWN DATE";

          const text = document.createElement("div");
          text.className = "log-text";
          text.textContent = log.text || "";

          item.appendChild(date);
          item.appendChild(text);
          list.appendChild(item);
        });
      }

      saveBtn.addEventListener("click", () => {
        const value = textarea.value.trim();
        if (!value) return;

        const logs = loadCampfireLogs();
        logs.push({
          id: Date.now(),
          date: new Date().toLocaleString(),
          text: value
        });
        saveCampfireLogs(logs);
        textarea.value = "";
        redrawLogs();
      });

      clearBtn.addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEYS.campfire);
        redrawLogs();
      });

      actions.appendChild(saveBtn);
      actions.appendChild(clearBtn);
      stack.appendChild(hint);
      stack.appendChild(textarea);
      stack.appendChild(actions);
      stack.appendChild(list);
      modalBody.appendChild(stack);

      redrawLogs();
    }

    function openPanel(panelKey, button) {
      const content = panelContent[panelKey];
      if (!content) return;

      modalKicker.textContent = content.kicker;
      modalTitle.textContent = content.title;

      if (content.type === "creative") {
        renderCreativePanel();
      } else if (content.type === "campfire") {
        renderCampfirePanel();
      } else {
        renderTextPanel(content);
      }

      overlay.classList.add("open");
      document.body.style.overflowY = "hidden";

      document.querySelectorAll(".menu-btn").forEach((btn) => btn.classList.remove("active"));
      if (button) button.classList.add("active");
    }

    function closePanel() {
      overlay.classList.remove("open");
      document.body.style.overflowY = "auto";
    }

    function wireMenuButtons() {
      const buttons = document.querySelectorAll(".menu-btn");

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          openPanel(button.dataset.panel, button);
        });
      });

      modalClose.addEventListener("click", closePanel);
      modalAction.addEventListener("click", closePanel);

      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) closePanel();
      });
    }

    document.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "s" && !bootFinished) {
        skipBoot();
      }

      if (e.key === "Escape" && overlay.classList.contains("open")) {
        closePanel();
      }
    });

    window.addEventListener("load", () => {
      setInitialState();
      wireMenuButtons();
      setTimeout(typeBootText, 1900);
    });
  </script></body>
  </html>
