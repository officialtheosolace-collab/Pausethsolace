<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OH7 Pause Menu</title>
  <style>
    :root {
      --bg: #050000;
      --hud: #ff7a00;
      --hud-dim: rgba(255, 122, 0, 0.35);
      --text: #ff9a1f;
      --panel: rgba(20, 5, 0, 0.4);
      --shadow: 0 0 8px rgba(255, 122, 0, 0.4), 0 0 18px rgba(255, 70, 0, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Courier New", monospace;
    }

    body {
      position: relative;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    .screen {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(120, 20, 0, 0.22) 0%, rgba(0, 0, 0, 0) 45%),
        linear-gradient(rgba(255, 100, 0, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 100, 0, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, #120100 0%, #050000 55%, #000000 100%);
      background-size: auto, 5px 5px, 5px 5px, auto;
      isolation: isolate;
      padding: 20px 0;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(0, 0, 0, 0.95) 0 8%, transparent 9%),
        radial-gradient(circle at 70% 35%, rgba(0, 0, 0, 0.9) 0 11%, transparent 12%),
        radial-gradient(circle at 35% 70%, rgba(0, 0, 0, 0.92) 0 10%, transparent 11%),
        radial-gradient(circle at 75% 78%, rgba(0, 0, 0, 0.88) 0 12%, transparent 13%),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.75) 0 18%, transparent 19%);
      opacity: 0.9;
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0) 0px,
        rgba(255, 255, 255, 0) 2px,
        rgba(255, 120, 0, 0.025) 3px,
        rgba(255, 255, 255, 0) 4px
      );
      opacity: 0.5;
      pointer-events: none;
      animation: scanMove 7s linear infinite;
    }

    @keyframes scanMove {
      from { transform: translateY(0); }
      to { transform: translateY(12px); }
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, transparent 45%, rgba(0, 0, 0, 0.45) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .boot-wrap,
    .menu-wrap {
      position: relative;
      width: min(90vw, 640px);
      z-index: 3;
    }

    .boot-wrap {
      min-height: min(72vh, 700px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .target-box {
      position: relative;
      width: 90px;
      height: 90px;
      transform: scale(0.45);
      opacity: 0;
      animation:
        bootAppear 0.35s ease-out forwards 0.2s,
        boxExpand 1.15s cubic-bezier(.2, .85, .18, 1) forwards 0.65s;
    }

    @keyframes bootAppear {
      to {
        opacity: 1;
        transform: scale(0.45);
      }
    }

    @keyframes boxExpand {
      to {
        width: min(78vw, 460px);
        height: min(44vh, 300px);
        transform: scale(1);
      }
    }

    .corner {
      position: absolute;
      width: 42px;
      height: 42px;
      border-color: var(--hud);
      filter: drop-shadow(0 0 5px rgba(255, 120, 0, 0.75));
      animation: flicker 2.2s infinite;
    }

    .corner.tl {
      top: 0;
      left: 0;
      border-top: 6px solid var(--hud);
      border-left: 6px solid var(--hud);
    }

    .corner.tr {
      top: 0;
      right: 0;
      border-top: 6px solid var(--hud);
      border-right: 6px solid var(--hud);
    }

    .corner.bl {
      bottom: 0;
      left: 0;
      border-bottom: 6px solid var(--hud);
      border-left: 6px solid var(--hud);
    }

    .corner.br {
      bottom: 0;
      right: 0;
      border-bottom: 6px solid var(--hud);
      border-right: 6px solid var(--hud);
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      8% { opacity: 0.78; }
      12% { opacity: 1; }
      16% { opacity: 0.65; }
      18% { opacity: 1; }
      52% { opacity: 0.92; }
      54% { opacity: 0.72; }
      56% { opacity: 1; }
    }

    .boot-content {
      position: absolute;
      inset: 26px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
    }

    .terminal {
      width: 100%;
      font-size: clamp(13px, 1.9vw, 18px);
      line-height: 1.55;
      letter-spacing: 0.08em;
      white-space: pre-wrap;
      text-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(6px);
      animation: terminalIn 0.45s ease-out forwards 1.7s;
    }

    @keyframes terminalIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .cursor {
      display: inline-block;
      width: 0.7ch;
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .menu-wrap {
      display: none;
      opacity: 0;
      min-height: auto;
      padding: 42px 0;
      animation: menuFade 0.55s ease-out forwards;
    }

    @keyframes menuFade {
      to { opacity: 1; }
    }

    .hud-frame {
      position: absolute;
      inset: 0;
      min-height: 100%;
      pointer-events: none;
    }

    .hud-frame .corner {
      width: 55px;
      height: 55px;
      border-width: 5px;
    }

    .menu-panel {
      position: relative;
      margin: 42px 28px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 18px;
      padding: 12px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--hud-dim);
      text-shadow: var(--shadow);
    }

    .header-title {
      font-size: clamp(14px, 1.8vw, 18px);
      letter-spacing: 0.16em;
      line-height: 1.2;
    }

    .header-user {
      font-size: clamp(10px, 1.3vw, 12px);
      opacity: 0.82;
      text-align: right;
      line-height: 1.2;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--hud-dim);
      background: var(--panel);
      padding: 9px 10px;
      min-height: 54px;
      box-shadow: inset 0 0 0 1px rgba(255, 122, 0, 0.08);
    }

    .stat-label {
      font-size: 9px;
      opacity: 0.75;
      letter-spacing: 0.14em;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: clamp(13px, 1.8vw, 18px);
      text-shadow: var(--shadow);
      line-height: 1.15;
    }

    .menu-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      align-content: start;
    }

    .menu-btn {
      position: relative;
      border: 1px solid var(--hud-dim);
      background: rgba(15, 5, 0, 0.58);
      color: var(--text);
      padding: 11px 12px;
      text-align: left;
      font: inherit;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        transform 0.15s ease,
        border-color 0.15s ease,
        background 0.15s ease,
        box-shadow 0.15s ease;
      overflow: hidden;
      min-height: 48px;
    }

    .menu-btn:hover,
    .menu-btn.active {
      transform: translateY(-1px);
      border-color: var(--hud);
      background: rgba(30, 10, 0, 0.75);
      box-shadow: 0 0 0 1px rgba(255, 122, 0, 0.16), 0 0 16px rgba(255, 122, 0, 0.12);
    }

    .menu-btn::before {
      content: ">";
      position: absolute;
      left: 10px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .menu-btn:hover::before,
    .menu-btn.active::before {
      opacity: 1;
    }

    .menu-btn span {
      margin-left: 12px;
      display: inline-block;
      line-height: 1.15;
    }

    .footer-line {
      font-size: 10px;
      opacity: 0.82;
      border-top: 1px solid var(--hud-dim);
      padding-top: 8px;
      letter-spacing: 0.08em;
      text-shadow: var(--shadow);
      line-height: 1.3;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 640px) {
      .boot-wrap,
      .menu-wrap {
        width: min(94vw, 640px);
      }

      .menu-panel {
        margin: 28px 12px;
        gap: 12px;
        padding: 6px;
      }

      .header {
        gap: 8px;
      }

      .header-title {
        font-size: 14px;
      }

      .header-user {
        font-size: 10px;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
        gap: 7px;
      }

      .stat {
        padding: 8px 8px;
        min-height: 50px;
      }

      .stat-label {
        font-size: 8px;
        letter-spacing: 0.12em;
      }

      .stat-value {
        font-size: 12px;
      }

      .menu-buttons {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .menu-btn {
        min-height: 44px;
        padding: 10px 10px;
        font-size: 11px;
        letter-spacing: 0.08em;
      }

      .menu-btn span {
        margin-left: 10px;
      }

      .footer-line {
        font-size: 9px;
      }

      .target-box {
        animation:
          bootAppear 0.35s ease-out forwards 0.2s,
          boxExpandMobile 1.15s cubic-bezier(.2, .85, .18, 1) forwards 0.65s;
      }

      @keyframes boxExpandMobile {
        to {
          width: min(84vw, 360px);
          height: min(34vh, 220px);
          transform: scale(1);
        }
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <div class="vignette"></div>

    <section class="boot-wrap" id="bootWrap">
      <div class="target-box" id="targetBox">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>

        <div class="boot-content">
          <div class="terminal" id="terminal"></div>
        </div>
      </div>
    </section>

    <section class="menu-wrap" id="menuWrap">
      <div class="hud-frame">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
      </div>

      <div class="menu-panel">
        <div class="header">
          <div class="header-title">OH7 // PAUSE MENU</div>
          <div class="header-user">USER: ORDER066.EXE</div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-label">CREATIVE OUTPUT</div>
            <div class="stat-value">3 FILES</div>
          </div>
          <div class="stat">
            <div class="stat-label">STAMINA</div>
            <div class="stat-value">42%</div>
          </div>
          <div class="stat">
            <div class="stat-label">FOCUS</div>
            <div class="stat-value">UNSTABLE</div>
          </div>
          <div class="stat">
            <div class="stat-label">DISCIPLINE</div>
            <div class="stat-value">RECOVERING</div>
          </div>
        </div>

        <div class="menu-buttons">
          <button class="menu-btn active"><span>Creative Prompt</span></button>
          <button class="menu-btn"><span>Fight Boss</span></button>
          <button class="menu-btn"><span>Campfire Log</span></button>
          <button class="menu-btn"><span>Mission Board</span></button>
          <button class="menu-btn"><span>Daily Run</span></button>
          <button class="menu-btn"><span>Stats</span></button>
          <button class="menu-btn"><span>Inventory</span></button>
          <button class="menu-btn"><span>Settings</span></button>
        </div>

        <div class="footer-line">CAMPFIRE LINK: STANDBY // MISSION BOARD: READY</div>
      </div>
    </section>
  </main>

  <script>
    const bootLines = [
      "OH7 // SYSTEM WAKE",
      "USER: ORDER066.EXE",
      "CREATIVE OUTPUT: 3 FILES",
      "STAMINA: 42%",
      "FOCUS: UNSTABLE",
      "DISCIPLINE: RECOVERING",
      "LOADING PAUSE MENU..."
    ];

    const terminal = document.getElementById("terminal");
    const bootWrap = document.getElementById("bootWrap");
    const menuWrap = document.getElementById("menuWrap");

    let lineIndex = 0;
    let charIndex = 0;
    let builtText = "";
    let bootFinished = false;

    function setInitialState() {
      bootWrap.classList.remove("hidden");
      bootWrap.style.display = "flex";
      menuWrap.classList.remove("hidden");
      menuWrap.style.display = "none";
      terminal.innerHTML = "";
      lineIndex = 0;
      charIndex = 0;
      builtText = "";
      bootFinished = false;
      document.body.style.overflowY = "hidden";
    }

    function typeBootText() {
      if (bootFinished) return;

      if (lineIndex >= bootLines.length) {
        terminal.innerHTML = builtText + '<span class="cursor">█</span>';
        bootFinished = true;
        setTimeout(showMenu, 900);
        return;
      }

      const currentLine = bootLines[lineIndex];

      if (charIndex < currentLine.length) {
        builtText += currentLine.charAt(charIndex);
        charIndex++;
        terminal.innerHTML = builtText + '<span class="cursor">█</span>';
        setTimeout(typeBootText, 28);
      } else {
        builtText += "\n";
        lineIndex++;
        charIndex = 0;
        terminal.innerHTML = builtText + '<span class="cursor">█</span>';
        setTimeout(typeBootText, 160);
      }
    }

    function showMenu() {
      bootWrap.classList.add("hidden");
      bootWrap.style.display = "none";
      menuWrap.style.display = "block";
      document.body.style.overflowY = "auto";
    }

    function skipBoot() {
      bootFinished = true;
      showMenu();
    }

    document.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "s") {
        skipBoot();
      }
    });

    window.addEventListener("load", () => {
      setInitialState();
      setTimeout(typeBootText, 1900);
    });
  </script>
</body>
  </html>
